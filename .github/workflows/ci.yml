name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup .net
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: restore
        run: dotnet restore the-workshop.slnx

      - name: build
        run: dotnet build the-workshop.slnx --no-restore --configuration Release

      - name: test
        run: dotnet test the-workshop.slnx --no-build --configuration Release --verbosity normal
